services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce-sales-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # CORRECCIÓN: Se añadió /data al final de la ruta del contenedor
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 5
  backend:
    build:
      context: ./backend
    container_name: ecommerce-sales-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT}
      DATABASE_URL: ${DATABASE_URL}
      OLIST_DATASET_BASE_URL: ${OLIST_DATASET_BASE_URL}
    ports:
      - "${BACKEND_PORT}:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:4000/health\", res => { process.exit(res.statusCode === 200 ? 0 : 1); }).on(\"error\", () => process.exit(1));'" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: ecommerce-sales-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      # NOTA TÉCNICA: localhost:4000 funciona para peticiones desde el navegador (Cliente). 
      # Si usas Server Components (SSR) en Next.js, deberás usar http://backend:4000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:3000\", res => { process.exit(res.statusCode === 200 ? 0 : 1); }).on(\"error\", () => process.exit(1));'" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
